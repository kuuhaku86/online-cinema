services:
  backend:
    ports:
      - "127.0.0.1:3001:3000"
    command: npm run start:prod
    volumes: []
    environment:
      - NODE_ENV=production
      - APP_URL=https://${DOMAIN}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_NAME=onlinecinemadb
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - HATE_SPEECH_DETECTOR_URL=http://hate-speech-detector:5000

  frontend:
    profiles:
      - disabled

  db:

  redis:

  hate-speech-detector:

  frontend-builder:
    build: ./frontend
    command: sh -c "npm run build && cp -r dist/* /output/"
    volumes:
      - ${FRONTEND_OUTPUT:-./frontend-dist}:/output
    restart: "no"
